<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Parker Nelson</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Anonymous+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --concrete: #525252;
            --steel: #A8A8A8;
            --white: #FFFFFF;
            --charcoal: #2B2B2B;
            --off-white: #E8E8E8;
        }

        body {
            font-family: 'Anonymous Pro', monospace;
            background: var(--concrete);
            color: var(--off-white);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 100px 100px;
            pointer-events: none;
            z-index: 0;
        }

        .navbar {
            position: relative;
            z-index: 10;
            width: 100%;
            background: var(--charcoal);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .brand {
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--steel);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--white);
        }

        .main-content {
            flex: 1;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .contact-container {
            background: var(--charcoal);
            border: 4px solid var(--white);
            padding: 60px 80px;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .contact-title {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .contact-subtitle {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--steel);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 32px;
        }

        .title-divider {
            width: 50px;
            height: 2px;
            background: var(--white);
            margin: 0 auto 36px;
        }

        .email-address {
            font-size: 15px;
            color: var(--off-white);
            letter-spacing: 1px;
            margin-bottom: 36px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 16px 40px;
            border: 2px solid var(--white);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: block;
        }

        .btn-primary {
            background: var(--white);
            color: var(--charcoal);
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--white);
        }

        .btn-secondary {
            background: transparent;
            color: var(--steel);
            border-color: var(--steel);
        }

        .btn-secondary:hover {
            border-color: var(--white);
            color: var(--white);
        }

        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--steel);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>

    <nav class="navbar">
        <a href="/" class="brand">Parker Nelson</a>
        <div class="nav-links">
            <a href="/projects">Projects</a>
            <a href="/contact" class="active">Contact</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="contact-container">
            <div class="contact-title">Contact</div>
            <div class="contact-subtitle">Get in touch</div>
            <div class="title-divider"></div>
            <p class="email-address">pk.elliott11@gmail.com</p>
            <div class="btn-group">
                <a href="mailto:pk.elliott11@gmail.com" class="btn btn-primary">Send Email</a>
                <a href="/" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Parker Nelson
    </footer>
</body>
</html>
